window_size: 30
window_stride: 5
sampling_rate_hz: 50
dt: 0.02

num_raw_features: 18
num_relative_features: 4
num_derivative_features: 18
num_features: 40

words:
  target_frames: 100
  raw_augment_variants: 4
  augment_multiplier: 8
  batch_size: 16
  epochs: 100
  early_stopping_patience: 15
  reduce_lr_patience: 6

alphabet:
  pseudo_sequence_length: 30
  variants_per_sample: 30
  augment_multiplier: 4
  batch_size: 32
  epochs: 100
  early_stopping_patience: 12
  reduce_lr_patience: 5

optimizer:
  name: adam
  learning_rate: 0.0005

model:
  bilstm_units_1: 64
  bilstm_units_2: 32
  dense_units: 32
  spatial_dropout: 0.4
  dropout: 0.5
  lstm_dropout: 0.2
  recurrent_dropout: 0.2
  l2: 0.001

train_val_split: 0.2
random_state: 42
